apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: snus
  labels:
    app: gateway
    app.kubernetes.io/part-of: distributed-sensor-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: snus/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: snus
  labels:
    app: gateway
spec:
  # Public entry point for the system; reachable on <node-ip>:30080.
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      name: http
