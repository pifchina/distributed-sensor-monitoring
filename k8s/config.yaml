apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: snus
  labels:
    app.kubernetes.io/part-of: distributed-sensor-monitoring
data:
  ASPNETCORE_URLS: "http://+:8080"
  NotificationService__BaseUrl: "http://notification-service:8080"
  Security__ServerPrivateKeyPath: "/app/keys/server/server_rsa_private.pem"
  Security__SensorPublicKeysDirectory: "/app/keys/server/sensors"
