services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: snus
      POSTGRES_PASSWORD: snus
      POSTGRES_DB: sensordb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ingestion-service:
    build:
      context: .
      dockerfile: src/IngestionService/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - postgres
    volumes:
      # Server-side key material; generate with:
      #   dotnet run --project src/SensorSimulator -- --keygen
      - ./keys/server:/app/keys/server:ro
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=sensordb;Username=snus;Password=snus
      ASPNETCORE_URLS: http://+:8080
      Security__ServerPrivateKeyPath: /app/keys/server/server_rsa_private.pem
      Security__SensorPublicKeysDirectory: /app/keys/server/sensors
      NotificationService__BaseUrl: http://notification-service:8080

  consensus-service:
    build:
      context: .
      dockerfile: src/ConsensusService/Dockerfile
    depends_on:
      - postgres
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=sensordb;Username=snus;Password=snus

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService/Dockerfile
    ports:
      - "5003:8080"
    depends_on:
      - postgres
    environment:
      ASPNETCORE_URLS: http://+:8080

  gateway:
    build:
      context: .
      dockerfile: src/GatewayService/Dockerfile
    # Public ingress: /api/ingest -> ingestion-service, /hub -> notification-service
    ports:
      - "8080:8080"
    depends_on:
      - ingestion-service
      - notification-service
    environment:
      ASPNETCORE_URLS: http://+:8080

volumes:
  pgdata:
